name: Repository Auto-Documentation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan

jobs:
  analyze_and_document:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Need write permission to commit back to the repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Need full history for some analysis tools

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Repository Analyzer
      run: python scripts/automation/repo_analyzer.py

    - name: Generate Knowledge Graph
      run: python scripts/automation/knowledge_graph.py

    - name: Generate Architecture Diagrams
      run: python scripts/automation/diagram_generator.py

    - name: Run AI Documentation Agent
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # Used by actual agent implementations
      run: python scripts/ai-agent/doc_agent.py

    - name: Generate self-updating README
      run: python scripts/automation/readme_generator.py

    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "docs(auto): Automatically update repository architecture and README"
        file_pattern: "README.md repo_analysis.json scripts/diagrams/* ai_summary.md"
        commit_user_name: "github-actions[bot]"
        commit_user_email: "github-actions[bot]@users.noreply.github.com"
        commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
