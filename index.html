<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Dark Mode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        /* --- CORE VISUALS --- */
        body {
            background-color: #000000; /* Pure Black Background */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            user-select: none; /* UI feel */
        }

        /* The Main App Window */
        .macos-window {
            width: 900px;
            height: 85vh;
            background: rgba(40, 40, 40, 0.7); /* Dark Glass */
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Window Header */
        .window-header {
            height: 52px;
            background: rgba(60, 60, 60, 0.3);
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            padding: 0 20px;
            flex-shrink: 0;
            -webkit-app-region: drag; /* Electron-like drag feel */
        }

        .window-title {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 0.9rem;
            flex-grow: 1;
            text-align: center;
            margin-right: 70px; /* Offset for centering */
        }

        /* Traffic Lights Interaction */
        .traffic-lights {
            display: flex;
            gap: 8px;
            width: 70px;
        }
        .light {
            width: 12px; height: 12px;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: rgba(0,0,0,0.5);
            font-weight: bold;
            cursor: default;
        }
        .light.red { background-color: #FF5F57; border: 1px solid #E0443E; }
        .light.yellow { background-color: #FEBC2E; border: 1px solid #D89E24; }
        .light.green { background-color: #28C840; border: 1px solid #1AAB29; }

        /* Show icons on hover */
        .traffic-lights:hover .light.red::after { content: "×"; }
        .traffic-lights:hover .light.yellow::after { content: "−"; }
        .traffic-lights:hover .light.green::after { content: "+"; }

        /* App Body */
        .app-body {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: rgba(30, 30, 30, 0.4);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            padding: 8px 12px;
            margin-bottom: 4px;
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
        }
        .menu-item i { margin-right: 10px; opacity: 0.8; }

        .menu-item:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
        .menu-item:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.12); }
        .menu-item.active { background: rgba(0, 122, 255, 0.6); color: #fff; }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            background: transparent;
        }

        /* Input Styling */
        .macos-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 15px;
            color: white;
            backdrop-filter: blur(10px);
        }
        .macos-input::placeholder { color: rgba(255,255,255,0.4); }
        .macos-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #0A84FF;
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.3);
            outline: none;
            color: white;
        }

        /* Buttons */
        .btn-primary-mac {
            background: #0A84FF;
            border: none;
            color: white;
            font-weight: 500;
            border-radius: 8px;
            padding: 8px 20px;
            transition: all 0.1s;
        }
        .btn-primary-mac:hover { background: #0071e3; transform: translateY(-1px); }
        .btn-primary-mac:active { transform: scale(0.96); }

        /* Task Rows */
        .task-row {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
        }
        .task-row:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.005);
        }
        .task-row.completed .task-text {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.3);
        }
        .task-text { color: rgba(255, 255, 255, 0.9); flex-grow: 1; margin-left: 12px; }

        /* Checkbox Custom */
        .custom-check {
            width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .custom-check:hover { border-color: #0A84FF; background: rgba(10,132,255,0.1); }
        .completed .custom-check {
            background: #0A84FF;
            border-color: #0A84FF;
        }
        .completed .custom-check::after {
            content: '✓'; color: white; font-size: 12px;
        }

        /* Delete Button */
        .btn-delete {
            opacity: 0;
            transition: 0.2s;
            color: #ff453a;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .task-row:hover .btn-delete { opacity: 1; }
        .btn-delete:hover { background: rgba(255, 69, 58, 0.15); }
        .btn-delete:active { transform: scale(0.9); }

        /* Footer */
        .window-footer {
            height: 32px;
            background: rgba(40, 40, 40, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }
        .window-footer strong { color: rgba(255,255,255,0.7); }

        /* Alert Animation */
        .alert-float {
            position: absolute;
            top: 20px; right: 20px;
            z-index: 100;
            background: rgba(40,40,40,0.95);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            animation: slideIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="macos-window" id="mainWindow">

    <div class="window-header">
        <div class="traffic-lights" onmouseenter="this.style.opacity='1'">
            <div class="light red" onclick="closeWindow()" title="Close"></div>
            <div class="light yellow" onclick="minimizeWindow()" title="Minimize"></div>
            <div class="light green" onclick="maximizeWindow()" title="Maximize"></div>
        </div>
        <div class="window-title">Nitish's Task Center</div>
    </div>

    <div class="app-body">

        <div class="sidebar d-none d-md-flex">
            <div class="text-uppercase small fw-bold mb-3 ps-2" style="color: rgba(255,255,255,0.3); font-size: 0.7rem;">Lists</div>

            <div class="menu-item active" onclick="setActiveMenu(this)">
                <i class="bi bi-check-circle"></i> My Tasks
            </div>
            <div class="menu-item" onclick="setActiveMenu(this)">
                <i class="bi bi-calendar3"></i> Scheduled
            </div>
            <div class="menu-item" onclick="setActiveMenu(this)">
                <i class="bi bi-star"></i> Important
            </div>
            <div class="menu-item" onclick="setActiveMenu(this)">
                <i class="bi bi-flag"></i> Flagged
            </div>

            <div class="mt-auto">
                <div class="menu-item text-danger" data-bs-toggle="modal" data-bs-target="#clearModal">
                    <i class="bi bi-trash"></i> Clear All
                </div>
            </div>
        </div>

        <div class="main-content">
            <div id="alertArea"></div>

            <h3 class="mb-4 text-white fw-light">Today</h3>

            <div class="d-flex mb-4">
                <input type="text" id="taskInput" class="form-control macos-input me-2" placeholder="Add a new task...">
                <button class="btn btn-primary-mac" id="addTaskBtn">Add Task</button>
            </div>

            <div id="taskList">
            </div>
        </div>
    </div>

    <div class="window-footer justify-content-between">
        <div>User: <strong>Nitish R.G.</strong> &bull; Reg: <strong>714025104183</strong> &bull; CSE - "C"</div>
        <div id="taskCount">0 tasks</div>
    </div>

</div>

<div class="modal fade" id="clearModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background: #2a2a2a; color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title">Clear All Tasks?</h5>
            </div>
            <div class="modal-body text-white-50">
                Are you sure? This will remove all data permanently.
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger rounded-pill" onclick="clearAllTasks()" data-bs-dismiss="modal">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // --- DATA & STATE ---
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

    // --- ELEMENTS ---
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const countLabel = document.getElementById('taskCount');

    // --- INIT ---
    render();

    // --- EVENTS ---
    document.getElementById('addTaskBtn').addEventListener('click', addTask);
    taskInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addTask() });

    // --- FUNCTIONS ---

    function addTask() {
        const text = taskInput.value.trim();
        if(!text) return;

        tasks.push({ id: Date.now(), text: text, completed: false });
        save();
        render();
        taskInput.value = '';
        showAlert('Task added');
    }

    function toggle(id) {
        tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
        save();
        render();
    }

    function remove(id) {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
    }

    function clearAllTasks() {
        tasks = [];
        save();
        render();
        showAlert('All tasks cleared');
    }

    function save() {
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function render() {
        taskList.innerHTML = '';
        tasks.forEach(t => {
            const div = document.createElement('div');
            div.className = `task-row ${t.completed ? 'completed' : ''}`;
            div.onclick = (e) => {
                // Only toggle if not clicking the delete button
                if(!e.target.closest('.btn-delete')) toggle(t.id);
            };

            div.innerHTML = `
                    <div class="custom-check me-3"></div>
                    <span class="task-text">${t.text}</span>
                    <i class="bi bi-x-lg btn-delete" onclick="remove(${t.id})"></i>
                `;
            taskList.prepend(div);
        });
        countLabel.innerText = `${tasks.length} tasks`;
    }

    // --- UI INTERACTION FUNCTIONS ---

    function setActiveMenu(el) {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function showAlert(msg) {
        const alert = document.createElement('div');
        alert.className = 'alert alert-float px-3 py-2';
        alert.innerHTML = `<i class="bi bi-check-circle-fill text-success me-2"></i> ${msg}`;
        document.getElementById('alertArea').appendChild(alert);
        setTimeout(() => alert.remove(), 2500);
    }

    // Mock Window Controls
    function closeWindow() {
        document.getElementById('mainWindow').style.opacity = '0';
        document.getElementById('mainWindow').style.transform = 'scale(0.9)';
        setTimeout(() => {
            alert("This is a web demo. Refresh to bring the window back!");
            location.reload();
        }, 800);
    }

    function minimizeWindow() {
        document.getElementById('mainWindow').style.transform = 'translateY(200px) scale(0.8) opacity(0.5)';
        setTimeout(() => { document.getElementById('mainWindow').style.transform = 'none'; }, 1000);
    }

    function maximizeWindow() {
        const win = document.getElementById('mainWindow');
        if(win.style.width === '100%') {
            win.style.width = '900px'; win.style.height = '85vh'; win.style.borderRadius = '12px';
        } else {
            win.style.width = '100%'; win.style.height = '100vh'; win.style.borderRadius = '0';
        }
    }
</script>
</body>
</html>
