
<!DOCTYPE html>
<html>
<head>
  <title>Interactive Repository Architecture</title>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style type="text/css">
    #mynetwork {
      width: 100%;
      height: 800px;
      border: 1px solid lightgray;
    }
    body { font-family: sans-serif; }
  </style>
</head>
<body>
<h2>Interactive Repository Architecture</h2>
<p>Click on nodes to navigate to source files or external dependencies.</p>
<div id="mynetwork"></div>

<script type="text/javascript">
  var nodes = new vis.DataSet([{"id": "Root", "label": "Repository", "group": "root", "url": "https://github.com"}, {"id": "scripts", "label": "scripts", "group": "dir", "url": "https://github.com/tree/main/scripts"}, {"id": "scripts_files", "label": "Files: 5", "group": "files"}, {"id": "docs", "label": "docs", "group": "dir", "url": "https://github.com/tree/main/docs"}, {"id": "Root_files", "label": "Root Files: 2", "group": "files"}, {"id": "Deps", "label": "Dependencies", "group": "deps"}, {"id": "dep_pyyaml", "label": "pyyaml", "group": "dep_item", "url": "https://pypi.org/project/pyyaml/"}, {"id": "dep_requests", "label": "requests", "group": "dep_item", "url": "https://pypi.org/project/requests/"}, {"id": "dep_os", "label": "os", "group": "dep_item", "url": "https://pypi.org/project/os/"}, {"id": "dep_pathlib", "label": "pathlib", "group": "dep_item", "url": "https://pypi.org/project/pathlib/"}, {"id": "dep_json", "label": "json", "group": "dep_item", "url": "https://pypi.org/project/json/"}, {"id": "dep_ast", "label": "ast", "group": "dep_item", "url": "https://pypi.org/project/ast/"}]);
  var edges = new vis.DataSet([{"from": "Root", "to": "scripts"}, {"from": "scripts", "to": "scripts_files"}, {"from": "Root", "to": "docs"}, {"from": "Root", "to": "Root_files"}, {"from": "Root", "to": "Deps"}, {"from": "Deps", "to": "dep_pyyaml"}, {"from": "Deps", "to": "dep_requests"}, {"from": "Deps", "to": "dep_os"}, {"from": "Deps", "to": "dep_pathlib"}, {"from": "Deps", "to": "dep_json"}, {"from": "Deps", "to": "dep_ast"}]);

  var container = document.getElementById('mynetwork');
  var data = {
    nodes: nodes,
    edges: edges
  };
  var options = {
    nodes: {
      shape: 'box',
      margin: 10,
      font: { size: 14 }
    },
    groups: {
      root: { color: { background: '#f5b041', border: '#e67e22' } },
      dir: { color: { background: '#85c1e9', border: '#3498db' } },
      files: { color: { background: '#d7dbdd', border: '#99a3a4' } },
      deps: { color: { background: '#82e0aa', border: '#2ecc71' } },
      dep_item: { color: { background: '#eaeded', border: '#bdc3c7' } }
    },
    layout: {
      hierarchical: {
        direction: 'UD',
        sortMethod: 'directed'
      }
    },
    physics: false
  };
  var network = new vis.Network(container, data, options);

  network.on("click", function (params) {
    if (params.nodes.length > 0) {
      var nodeId = params.nodes[0];
      var node = nodes.get(nodeId);
      if (node.url) {
        window.open(node.url, '_blank');
      }
    }
  });
</script>
</body>
</html>
